name: nh-archive

services:
  app:
    image: ghcr.io/dormiveglia0/nhentai-archive:latest
    init: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      NHENTAI_API_KEY: ${NHENTAI_API_KEY:-}
    volumes:
      - nh-archive-data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  nh-archive-data:
