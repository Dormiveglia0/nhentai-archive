services:
  app:
    build: .
    container_name: nhentai-archive
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-before-public-deploy}
      PUBLIC_HOST_LABEL: ${PUBLIC_HOST_LABEL:-IP:${PUBLIC_PORT:-5413}}
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/app.db
      LIBRARY_DIR: /app/data/library
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-30}
      REQUEST_INTERVAL_MS: ${REQUEST_INTERVAL_MS:-900}
      REQUEST_RETRIES: ${REQUEST_RETRIES:-3}
      DOWNLOAD_CONCURRENCY: ${DOWNLOAD_CONCURRENCY:-2}
      TARGET_LANGUAGE: ${TARGET_LANGUAGE:-zh-CN}
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${PUBLIC_PORT:-5413}:8080"
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
    restart: unless-stopped
